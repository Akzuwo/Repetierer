name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate release notes
        id: release-notes
        run: node scripts/generate-release-notes.js

      - name: Build and publish release
        run: npm run release:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release body
        run: gh release edit "${{ steps.release-notes.outputs.tag }}" --notes-file "${{ steps.release-notes.outputs.release_notes_path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
