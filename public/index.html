<!doctype html>

<html lang="de">

<head>
	<meta charset="utf-8">
	<title>Repetierer</title>
	<meta name="description" content="(:">
	<meta name="author" content="srpnt3, Jonas-Luetolf, Akzuwo">
	<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="container">

	<div id="title-bar">
		<div class="ico" id="settings-btn" title="Einstellungen">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
				<path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.37-.31-.6-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98L14.5 2.42C14.47 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42L9.12 5.07c-.61.25-1.18.59-1.69.98l-2.49-1c-.23-.08-.48 0-.6.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.08.65-.08.98s.03.66.08.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.37.31.6.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .47-.18.5-.42l.38-2.65c.61-.25 1.18-.59 1.69-.98l2.49 1c.23.08.48 0 .6-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
			</svg>
		</div>
		<div class="ico" id="minimize">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 6">
				<rect width="56" height="6" rx="3"/>
			</svg>
		</div>
		<div class="ico" id="quit">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58.72 57.8">
				<path d="M57.86.9h0a3,3,0,0,0-4.24,0L29.36,24.69,5.1.86A3,3,0,0,0,.86.9h0a3,3,0,0,0,0,4.24L25.08,28.9.9,52.66a3,3,0,0,0,0,4.24h0a3,3,0,0,0,4.24,0L29.36,33.1,53.62,56.94a3,3,0,0,0,4.24,0h0a3,3,0,0,0,0-4.24L33.64,28.9,57.82,5.14A3,3,0,0,0,57.86.9Z"/>
			</svg>
		</div>
	</div>

	<div id="info">
		<p id="version"></p>
		<p style="align-self: end">by srpnt3, Jonas-Luetolf and Akzuwo</p>
	</div>

	<h1 id="title">Repetierer</h1>

	<div id="content">
		<div class="neum" id='file'>
			<h2>Datei</h2>
			<button class="btn-1">Datei Auswählen</button>
			<p id="file-path"></p>
			<button class="btn-2" id="backup-btn">Backup anzeigen</button>
		</div>
		<div class="neum" id="class">
			<h2>Klasse</h2>
			<div id="class-list">
				<div></div>
			</div>
		</div>
		<div class="neum" id="repetition">
			<h2>Repetition <span id="class-name"></span></h2>
			<div class="button-row">
				<button class="btn-1 disabled" id="start-btn">Start</button>
				<button class="btn-1 disabled" id="manual-select-btn">Freiwillig</button>
				<button class="btn-2 disabled" id="probabilities-btn">Chancen</button>
				<button class="btn-2 disabled" id="flush-excel-btn">Excel aktualisieren</button>
			</div>
			<h1 class="disabled" id="name">Name</h1>
			<div id="res">
				<div id="grade">
					<label class="disabled">Note: </label>
					<input class="disabled" name="mark" type="text">
				</div>
				<button class="btn-2 disabled">Abbrechen</button>
				<button class="btn-1 disabled">OK</button>
				<button class="btn-1 disabled">Joker</button>
			</div>
		</div>
	</div>

	<div id="person-modal" class="modal">
		<div class="modal-content">
			<h2>Schüler auswählen</h2>
			<div id="person-list"></div>
			<div class="modal-buttons">
				<button class="btn-1" id="random-select-btn">Auswählen</button>
				<button class="btn-2" id="close-modal">Abbrechen</button>
			</div>
		</div>
	</div>

	<div id="backup-modal" class="modal">
		<div class="modal-content backup-content">
			<h2>Backup</h2>
			<p id="backup-location"></p>
			<div id="backup-list"></div>
			<div class="modal-buttons">
				<button class="btn-2" id="close-backup-modal">Schließen</button>
			</div>
		</div>
	</div>

	<div id="probabilities-modal" class="modal">
		<div class="modal-content probability-content">
			<h2>Wahrscheinlichkeiten</h2>
			<div id="probability-list"></div>
			<div class="modal-buttons">
				<button class="btn-2" id="close-probabilities-modal">Schließen</button>
			</div>
		</div>
	</div>

	<div id="settings-modal" class="modal">
		<div class="modal-content settings-content">
			<h2>Einstellungen</h2>
			<p id="settings-location"></p>
			<label class="setting-row">
				<input type="checkbox" id="extra-joker-setting">
				<span>Personen mit mindestens 3 Noten bekommen einen extra Joker</span>
			</label>
			<label class="setting-field">
				<span>Wahrscheinlichkeit sinkt pro Note um den Faktor</span>
				<input id="probability-factor-setting" type="number" min="1.1" max="10" step="0.1">
			</label>
			<label class="setting-row">
				<input type="checkbox" id="boost-never-selected-setting">
				<span>Personen ohne Note deutlich wahrscheinlicher auswählen</span>
			</label>
			<label class="setting-field">
				<span>Extra-Faktor für Personen ohne Note</span>
				<input id="never-selected-boost-factor-setting" type="number" min="1.1" max="10" step="0.1">
			</label>
			<p class="settings-help">Standard ist 3. Das bedeutet: Nach jeder Note hat eine Person nur noch ein Drittel ihres vorherigen Gewichts.</p>
			<div class="modal-buttons">
				<button class="btn-1" id="save-settings-btn">Speichern</button>
				<button class="btn-2" id="close-settings-modal">Abbrechen</button>
			</div>
		</div>
	</div>

</div>
</body>

<script>
	require('./renderProcess.js');
</script>

</html>
